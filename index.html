@import url('https://fonts.googleapis.com/css2?family=Fraunces:opsz,wght@9..144,500;9..144,600&family=Hanken+Grotesk:wght@400;500;600;700;800&family=JetBrains+Mono:wght@400;500&display=swap');
.anc-root{--bg:#FDF6E9;--card:#FFFDF7;--ink:#3B322A;--muted:#8C8069;--line:#EADFC9;--go:#E0674F;--soleil:#F3C766;--ciel:#8FC7E8;--serif:'Fraunces',Georgia,serif;--sans:'Hanken Grotesk',system-ui,-apple-system,sans-serif;--mono:'JetBrains Mono',ui-monospace,Menlo,monospace;max-width:430px;margin:0 auto;min-height:100vh;background:var(--bg);color:var(--ink);font-family:var(--sans);position:relative;-webkit-font-smoothing:antialiased;}
.anc-root *{box-sizing:border-box;}
.anc-root button{font-family:var(--sans);cursor:pointer;}
.anc-screen{min-height:100vh;padding:18px 18px calc(28px + env(safe-area-inset-bottom));display:flex;flex-direction:column;position:relative;}
.anc-h1{font-family:var(--serif);font-weight:600;font-size:27px;letter-spacing:-.01em;margin:10px 0 16px;text-align:center;}
.anc-h1.left{text-align:left;margin:6px 2px 14px;}
.anc-h1.serif{font-size:24px;}
.anc-lede{color:var(--muted);font-size:14px;margin:0 2px 14px;line-height:1.5;}
.anc-empty{text-align:center;color:var(--muted);font-size:15px;line-height:1.5;padding:14px 6px;}
.anc-credit{text-align:center;font-family:var(--mono);font-size:10px;color:var(--muted);opacity:.6;margin-top:auto;padding-top:26px;letter-spacing:.03em;pointer-events:none;}
.anc-back,.anc-exit{background:none;border:none;color:var(--muted);font-size:15px;font-weight:700;padding:4px 0;text-align:left;align-self:flex-start;}
.anc-toast{position:fixed;left:50%;transform:translateX(-50%);bottom:26px;background:var(--ink);color:#FDFAF3;padding:12px 18px;border-radius:24px;font-size:14px;font-weight:600;max-width:360px;text-align:center;z-index:60;box-shadow:0 6px 24px rgba(0,0,0,.18);}

/* ---- Mascotte ---- */
.anc-masc{display:flex;align-items:center;justify-content:center;}
.anc-masc svg{overflow:visible;}
.anc-eyes{transform-origin:60px 56px;animation:anc-blink 4.6s ease-in-out infinite;}
@keyframes anc-blink{0%,92%,100%{transform:scaleY(1)}95%{transform:scaleY(.12)}}
.anc-rays{transform-origin:60px 62px;}
.anc-arm{transform-origin:60px 62px;}
.anc-arm.l{transform-origin:34px 61px;}
.anc-arm.r{transform-origin:86px 61px;}
.anc-pose-idle svg{animation:anc-bob 2.8s ease-in-out infinite;}
@keyframes anc-bob{0%,100%{transform:translateY(0)}50%{transform:translateY(-4px)}}
.anc-pose-travail svg{animation:anc-lean 1.6s ease-in-out infinite;}
@keyframes anc-lean{0%,100%{transform:translateY(0) rotate(-2.5deg)}50%{transform:translateY(-3px) rotate(2.5deg)}}
.anc-pose-travail .anc-arm.l{animation:anc-swing 0.6s ease-in-out infinite reverse;}
.anc-pose-travail .anc-arm.r{animation:anc-swing 0.6s ease-in-out infinite;}
@keyframes anc-swing{0%,100%{transform:rotate(-16deg)}50%{transform:rotate(14deg)}}
.anc-pose-fete svg{animation:anc-jump 0.7s cubic-bezier(.3,1.6,.4,1) infinite;}
@keyframes anc-jump{0%,100%{transform:translateY(0)}45%{transform:translateY(-12px)}}
.anc-pose-fete .anc-rays{animation:anc-shine 1.4s linear infinite;}
@keyframes anc-shine{from{transform:rotate(0)}to{transform:rotate(45deg)}}
.anc-pose-fete .anc-arm.l{transform:rotate(46deg);}
.anc-pose-fete .anc-arm.r{transform:rotate(-46deg);}

/* ---- Anneau ---- */
.anc-ring{position:relative;display:flex;align-items:center;justify-content:center;flex:none;}
.anc-ring svg{position:absolute;inset:0;}
.anc-ring-in{display:flex;flex-direction:column;align-items:center;justify-content:center;z-index:1;}

/* ---- Qui es-tu ---- */
.anc-who{align-items:center;justify-content:center;gap:6px;}
.anc-who-grid{display:flex;flex-wrap:wrap;gap:16px;justify-content:center;margin-top:8px;}
.anc-who-btn{display:flex;flex-direction:column;align-items:center;gap:10px;border:3px solid;border-radius:26px;padding:18px 22px;min-width:132px;}
.anc-who-av{width:76px;height:76px;border-radius:50%;display:flex;align-items:center;justify-content:center;font-size:40px;}
.anc-who-name{font-family:var(--serif);font-weight:600;font-size:21px;color:var(--ink);}

/* ---- Accueil enfant ---- */
.anc-kid-head{display:flex;align-items:center;gap:12px;margin-bottom:4px;}
.anc-kid-av{width:52px;height:52px;border-radius:50%;border:none;font-size:27px;display:flex;align-items:center;justify-content:center;flex:none;}
.anc-kid-hello{display:flex;flex-direction:column;flex:1;}
.anc-kid-name{font-family:var(--serif);font-weight:600;font-size:22px;}
.anc-grid{display:grid;grid-template-columns:1fr 1fr;gap:12px;}
.anc-card{position:relative;border:3px solid;border-radius:22px;padding:16px 12px 14px;display:flex;flex-direction:column;align-items:center;gap:8px;min-height:140px;justify-content:center;transition:transform .1s;}
.anc-card.small{min-height:0;flex-direction:row;justify-content:flex-start;padding:10px 14px;gap:12px;}
.anc-card-icon{font-size:44px;line-height:1;}
.anc-card.small .anc-card-icon{font-size:26px;}
.anc-card-title{font-weight:800;font-size:16px;line-height:1.2;text-align:center;color:var(--ink);}
.anc-card.small .anc-card-title{font-size:14.5px;text-align:left;}
.anc-card-meta{display:flex;align-items:center;gap:8px;}
.anc-card-stars{font-size:13px;color:#E7A93A;letter-spacing:1.5px;line-height:1;}
.anc-card-pin{position:absolute;top:8px;left:10px;font-size:14px;line-height:1;opacity:.9;}
.anc-card.small .anc-card-stars{font-size:11px;letter-spacing:1px;}
.anc-card-meta.done .anc-card-stars{color:#C6BBA2;}
.anc-card-min{font-family:var(--mono);font-size:12px;color:var(--muted);font-weight:500;}
.anc-edit-stars b{color:#E7A93A;font-size:15px;letter-spacing:1.5px;}
.anc-edit-stars span{font-size:12px;}

.anc-card-sun{position:absolute;top:8px;right:11px;font-size:20px;color:var(--soleil);text-shadow:0 1px 0 rgba(59,50,42,.15);}
.anc-later-label{font-family:var(--mono);font-size:10.5px;color:var(--muted);text-transform:uppercase;letter-spacing:.05em;margin:20px 2px 10px;}

.anc-input:focus{border-color:var(--ink);}

.anc-link{background:none;border:none;color:var(--ink);font-weight:700;text-decoration:underline;padding:0;font-size:13.5px;}
.anc-aside{font-size:12.5px;color:var(--muted);line-height:1.45;margin:10px 0 0;}
.anc-panel{background:var(--card);border:1px solid var(--line);border-radius:16px;padding:15px;margin-bottom:14px;}
.anc-form{background:var(--card);border:1px solid var(--line);border-radius:16px;padding:15px;margin-top:14px;}
/* Deux champs qui se partagent la ligne, quels qu'ils soient. C'est flex:1 1 0 qui force
   le partage : sans lui, un enfant en width:100% (comme .anc-input) r\xE9clame la largeur
   ENTI\xC8RE et pousse l'autre dehors. \xC7a tenait tant que les deux enfants \xE9taient des
   .anc-input identiques : ils se r\xE9tr\xE9cissaient \xE0 parts \xE9gales, par accident. Le premier
   enfant d'une autre nature a fait tomber la r\xE8gle. */
.anc-2col{display:flex;gap:8px;align-items:stretch;}
.anc-2col > *{flex:1 1 0;min-width:0;}
/* Le voile gris que le syst\xE8me pose sur un \xE9l\xE9ment touch\xE9 se superposait \xE0 l'effet
   d'enfoncement et le noyait. On le retire : le retour tactile est le n\xF4tre. */
*{-webkit-tap-highlight-color:transparent;}
/* Le rebond, jou\xE9 EN ENTIER avant que l'action ne change l'\xE9cran (voir usePresse).
   Un aller-retour, pas un \xE9tat fig\xE9 : c'est le mouvement qui se voit.
   \u26A0\uFE0F Ces quatre boutons n'ont PAS de :active \u2014 le doigt jouerait un premier
   aller-retour, puis l'animation un second. On lisait un double clic. Un bouton
   pilot\xE9 par usePresse a UN seul effet, celui-ci. */
@keyframes anc-presse{0%{transform:scale(1);filter:brightness(1);}40%{transform:scale(.9);filter:brightness(.84);}100%{transform:scale(1);filter:brightness(1);}}
.anc-card.presse,.anc-who-btn.presse,.anc-gobtn.presse,.anc-finishbtn.presse{animation:anc-presse .2s cubic-bezier(.3,0,.2,1);}
/* --- Retour tactile. Sans lui, on ne sait pas si le doigt a \xE9t\xE9 pris en compte :
   sur mobile il n'y a pas de survol, la pression est le SEUL retour possible. --- */
.anc-card,.anc-mini,.anc-cta,.anc-chip,.anc-who-btn,.anc-softbtn,.anc-seg-btn,.anc-gobtn,.anc-finishbtn,.anc-fab,.anc-iconbtn,.anc-icon{transition:transform .11s cubic-bezier(.34,1.4,.64,1),filter .11s ease,opacity .11s ease;}
.anc-mini:active,.anc-chip:active,.anc-seg-btn:active,.anc-iconbtn:active,.anc-icon:active{transform:scale(.94);filter:brightness(.95);}
.anc-cta:active,.anc-softbtn:active{transform:scale(.97);filter:brightness(.94);}
.anc-fab:active{transform:scale(.9);filter:brightness(.94);}
.anc-lib-main:active,.anc-row-main:active{opacity:.55;}
@media (prefers-reduced-motion: reduce){
  .anc-card,.anc-mini,.anc-cta,.anc-chip,.anc-who-btn,.anc-softbtn,.anc-seg-btn,.anc-gobtn,.anc-finishbtn,.anc-fab,.anc-iconbtn,.anc-icon{transition:none;}
  .anc-mini:active,.anc-chip:active,.anc-seg-btn:active,.anc-cta:active,.anc-softbtn:active,.anc-fab:active,.anc-iconbtn:active,.anc-icon:active{transform:none;filter:brightness(.94);}
}

.anc-avchip{width:32px;height:32px;border-radius:9px;border:1px solid var(--line);background:#FFFDF7;font-size:17px;display:flex;align-items:center;justify-content:center;}

/* --- Recherche de t\xE2ches --- */
.anc-search{display:flex;align-items:center;gap:8px;background:var(--card);border:1px solid var(--line);border-radius:12px;padding:0 10px;margin:0 0 10px;}
.anc-search:focus-within{border-color:var(--go);}
.anc-search-ic{color:var(--muted);font-size:17px;line-height:1;flex:none;}
.anc-search-in{flex:1;border:none;background:none;padding:11px 0;font-family:var(--sans);font-size:15px;color:var(--ink);min-width:0;}
.anc-search-in:focus{outline:none;}
.anc-search-in::placeholder{color:var(--muted);}
.anc-search-in::-webkit-search-cancel-button{display:none;}
.anc-search-res{font-family:var(--mono);font-size:11px;color:var(--muted);margin:-4px 0 10px;padding:0 3px;}
.anc-kid-stars{display:flex;align-items:center;gap:6px;font-family:var(--mono);font-size:11.5px;color:var(--muted);margin-top:3px;letter-spacing:.01em;}

.anc-kid-stars i{font-style:normal;opacity:.5;}
.anc-kid-switch{font-family:var(--mono);font-size:11px;color:var(--muted);font-weight:400;margin-left:8px;}
.anc-lib-wrap{border-radius:12px;}
.anc-lib-wrap.on{background:#FBF3E3;border:1px solid var(--line);padding:2px 8px 8px;margin:4px 0;}
.anc-lib-main{display:flex;align-items:center;gap:10px;flex:1;background:none;border:none;text-align:left;padding:0;min-width:0;}
.anc-row-top{display:flex;align-items:center;gap:8px;}
.anc-row-top .anc-row-main{flex:1;min-width:0;}
.danger-text{color:#C0402F !important;}
.anc-x.small{font-size:17px;padding:2px 2px;}
.anc-x{background:none;border:none;color:var(--muted);font-size:20px;line-height:1;padding:2px 6px;flex:none;}
.anc-jmetrics{display:flex;gap:22px;margin-bottom:10px;}
.anc-jmetrics>div{display:flex;flex-direction:column;}
.anc-jbig{font-family:var(--serif);font-weight:600;font-size:30px;line-height:1;}
.anc-jlbl{font-size:11px;color:var(--muted);margin-top:2px;}
.anc-chart{display:flex;align-items:flex-end;gap:5px;height:126px;padding-top:6px;}
.anc-bar-col{flex:1;display:flex;flex-direction:column;align-items:center;gap:5px;height:100%;justify-content:flex-end;}
.anc-bar-stack{width:100%;max-width:30px;display:flex;flex-direction:column-reverse;border-radius:5px 5px 0 0;overflow:hidden;min-height:2px;background:#F3ECDC;}
.anc-bar-stack>i{width:100%;display:block;min-height:2px;}
.anc-bar-lbl{font-family:var(--mono);font-size:9.5px;color:var(--muted);}
.anc-jrow{display:flex;align-items:center;gap:10px;background:var(--card);border:1px solid var(--line);border-left-width:4px;border-radius:12px;padding:10px 12px;margin-bottom:7px;}

.anc-range{width:100%;accent-color:var(--go);margin-top:4px;}
.anc-import{display:inline-flex;align-items:center;cursor:pointer;}

.anc-collapse{display:grid;grid-template-rows:0fr;transition:grid-template-rows .28s ease;}

.anc-dialwrap{display:flex;justify-content:center;padding:4px 0;}
.anc-dial{width:164px;height:164px;touch-action:none;cursor:grab;-webkit-user-select:none;user-select:none;}
.anc-dial:active{cursor:grabbing;}
.anc-dial-track{stroke:#EDE3CE;}
.anc-dial-arc{stroke:var(--go);}
.anc-dial-knob{fill:var(--go);stroke:#fff;stroke-width:2.5;}
.anc-dial-tick{stroke:#D3C5A6;stroke-width:2;stroke-linecap:round;}
.anc-dial-num{font-family:var(--serif);font-weight:600;font-size:34px;fill:var(--ink);}
.anc-dial-unit{font-family:var(--mono);font-size:12px;fill:var(--muted);}
/* --- En-t\xEAte d'identit\xE9 (changer d'enfant) --- */
.anc-kid-idbtn{display:flex;align-items:center;gap:12px;background:none;border:none;padding:0;flex:1;text-align:left;min-width:0;}
.anc-kid-idbtn:active{opacity:.65;}
/* --- Sc\xE8ne \xAB La maison qui s'\xE9veille \xBB --- */
.anc-scene-card{border:2px solid var(--line);border-radius:22px;overflow:hidden;margin-bottom:14px;background:#E8F3FB;box-shadow:0 8px 22px rgba(59,50,42,.08);}

.anc-scene-cap{padding:14px 16px;background:var(--card);}

.anc-scene-next.pleine{color:var(--go);font-weight:600;}

.anc-sc-bird1{transform-origin:180px 88px;animation:anc-scbob 2.6s ease-in-out infinite;}
@keyframes anc-scbob{0%,100%{transform:translateY(0)}50%{transform:translateY(-3px)}}
.anc-sc-bird2{animation:anc-scfly 13s linear infinite;}
@keyframes anc-scfly{0%{transform:translate(0,0)}50%{transform:translate(-26px,-9px)}100%{transform:translate(0,0)}}
.anc-sc-butterfly{transform-origin:256px 180px;animation:anc-scflutter 3.2s ease-in-out infinite;}

.anc-sc-rainbow{animation:anc-scfade 1.2s ease;}
@keyframes anc-scfade{from{opacity:0}to{opacity:1}}
/* --- Collection de tr\xE9sors --- */
.anc-collec{background:var(--card);border:1px solid var(--line);border-radius:16px;padding:14px;margin-bottom:14px;}
.anc-collec-head{display:flex;justify-content:space-between;align-items:baseline;margin-bottom:11px;}
.anc-collec-title{font-family:var(--mono);font-size:10.5px;color:var(--muted);text-transform:uppercase;letter-spacing:.05em;}

.anc-collec-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(86px,1fr));gap:8px;}
.anc-tres{display:flex;flex-direction:column;align-items:center;gap:5px;padding:11px 6px;border-radius:13px;background:#FBF3E3;border:1px solid var(--line);text-align:center;}
.anc-tres-ic{font-size:25px;line-height:1;}
.anc-tres-nm{font-size:10.5px;font-weight:600;color:var(--ink);line-height:1.2;}
.anc-tres.locked{opacity:.5;}
.anc-tres.locked .anc-tres-ic{filter:grayscale(.6);}
/* --- Animations des sc\xE8nes 3 et 4 --- */
.anc-sc-onde{animation:anc-onde 5s ease-in-out infinite;}
@keyframes anc-onde{0%,100%{opacity:.35;transform:translateX(0)}50%{opacity:.85;transform:translateX(6px)}}
.anc-sc-bob{animation:anc-scbob 2.6s ease-in-out infinite;}
.anc-sc-poisson{animation:anc-poisson 9s ease-in-out infinite;}
@keyframes anc-poisson{0%,100%{transform:translateX(0)}50%{transform:translateX(60px)}}
.anc-sc-lucioles{animation:anc-lucioles 3.4s ease-in-out infinite;}
@keyframes anc-lucioles{0%,100%{opacity:.45}50%{opacity:1}}
.anc-sc-clairiere{animation:anc-clairiere 8s ease-in-out infinite;}
@keyframes anc-clairiere{0%,100%{opacity:.7}50%{opacity:1}}
.anc-sc-tournesol{transform-origin:320px 124px;animation:anc-scspin 40s linear infinite;}
.anc-sc-abeille{animation:anc-libellule 8s ease-in-out infinite;}
.anc-sc-pousse{transform-origin:80px 230px;animation:anc-roseau 7s ease-in-out infinite;}
/* --- Animations des sc\xE8nes 5 et 6 --- */
.anc-sc-aurore{animation:anc-aurore 12s ease-in-out infinite;transform-origin:180px 40px;}
@keyframes anc-aurore{0%,100%{opacity:.5;transform:skewX(0deg)}50%{opacity:1;transform:skewX(3deg)}}
.anc-sc-glacon{animation:anc-glacon 9s ease-in-out infinite;}
@keyframes anc-glacon{0%,100%{transform:translate(0,0)}50%{transform:translate(-10px,3px)}}
.anc-sc-flocons{animation:anc-flocons 6s linear infinite;}
@keyframes anc-flocons{0%{opacity:.35;transform:translateY(-8px)}50%{opacity:1}100%{opacity:.35;transform:translateY(8px)}}
.anc-sc-scintille{animation:anc-scintille 3s ease-in-out infinite;}

.anc-sc-constel{animation:anc-scintille 5s ease-in-out infinite;}
.anc-sc-voute{animation:anc-scintille 7s ease-in-out infinite;}
.anc-sc-lactee{animation:anc-scintille 11s ease-in-out infinite;}
.anc-sc-filante{animation:anc-filante 9s ease-in-out infinite;}
@keyframes anc-filante{0%,72%{opacity:0;transform:translate(28px,-18px)}80%{opacity:1}92%,100%{opacity:0;transform:translate(-34px,22px)}}
.anc-sc-comete{animation:anc-comete 16s ease-in-out infinite;}
@keyframes anc-comete{0%,100%{transform:translate(0,0)}50%{transform:translate(22px,-8px)}}
.anc-sc-planete{animation:anc-scbob 7s ease-in-out infinite;}
/* --- Animations des sc\xE8nes 7 et 8 --- */
.anc-sc-algue{transform-origin:180px 232px;animation:anc-roseau 7s ease-in-out infinite;}
.anc-sc-baleine{animation:anc-baleine 26s linear infinite;}
@keyframes anc-baleine{0%{transform:translateX(140px)}100%{transform:translateX(-420px)}}
.anc-sc-banc{animation:anc-banc 13s ease-in-out infinite;}
@keyframes anc-banc{0%,100%{transform:translateX(0)}50%{transform:translateX(-46px)}}
.anc-sc-tortue{animation:anc-tortue 18s ease-in-out infinite;}
@keyframes anc-tortue{0%,100%{transform:translate(0,0)}50%{transform:translate(70px,16px)}}
.anc-sc-tentacules{transform-origin:182px 220px;animation:anc-roseau 4s ease-in-out infinite;}
.anc-sc-bulles{animation:anc-bulles 5s ease-in-out infinite;}
@keyframes anc-bulles{0%{opacity:.3;transform:translateY(10px)}50%{opacity:1}100%{opacity:.3;transform:translateY(-10px)}}
.anc-sc-oiseaux{animation:anc-oiseaux 22s ease-in-out infinite;}
@keyframes anc-oiseaux{0%,100%{transform:translate(0,0)}50%{transform:translate(60px,-12px)}}
/* --- Animations des sc\xE8nes 9 et 10 --- */
.anc-sc-arcciel{animation:anc-scintille 9s ease-in-out infinite;}

@keyframes anc-aigle{0%,100%{transform:translate(0,0)}50%{transform:translate(150px,-22px)}}
.anc-sc-montgolfiere{animation:anc-scbob 9s ease-in-out infinite;}
.anc-sc-lampe{animation:anc-scintille 6s ease-in-out infinite;}
.anc-sc-guirlande{animation:anc-scintille 4s ease-in-out infinite;}
.anc-sc-jet{animation:anc-jet 3s ease-in-out infinite;}
@keyframes anc-jet{0%,100%{opacity:.5;transform:translateY(2px)}50%{opacity:1;transform:translateY(-2px)}}

/* --- Mondes : \xE9tiquette, galerie --- */
.anc-monde-tag{background:var(--card);border-bottom:1px solid var(--line);padding:8px 14px;font-family:var(--mono);font-size:10.5px;color:var(--muted);text-transform:uppercase;letter-spacing:.05em;}
.anc-galerie{display:flex;flex-direction:column;gap:10px;}
